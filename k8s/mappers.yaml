# Mapper workers — parallelism controls how many run simultaneously
# Each pod pulls tasks from the Redis queue independently
apiVersion: batch/v1
kind: Job
metadata:
  name: mapreduce-mappers
  namespace: mapreduce
spec:
  # completions: not set — workers self-terminate when queue is empty
  parallelism: 3  # fits in 12GB minikube (3 × 1.5Gi = 4.5Gi)
  backoffLimit: 6
  template:
    metadata:
      labels:
        role: mapper
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mapper
          image: litvinchukroman/mapreduce-index:latest
          env:
            - name: ROLE
              value: "mapper"
            - name: MR_REDIS_HOST
              value: "redis"
            - name: INPUT_DIR
              value: "/data/input"
            - name: INTERMEDIATE_DIR
              value: "/data/intermediate"
            - name: NUM_REDUCERS
              value: "32"
            - name: COMBINER_FLUSH_SIZE
              value: "200000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1536Mi"
              cpu: "1"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mapreduce-data
