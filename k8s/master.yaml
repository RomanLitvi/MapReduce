# Master — splits input, coordinates map and reduce phases
apiVersion: batch/v1
kind: Job
metadata:
  name: mapreduce-master
  namespace: mapreduce
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      # Init container downloads data BEFORE master starts
      initContainers:
        - name: download-data
          image: litvinchukroman/mapreduce-index:latest
          command: ["python", "download_data.py", "--dataset", "large", "--max-size-gb", "2", "--output", "/data/input"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: master
          image: litvinchukroman/mapreduce-index:latest
          env:
            - name: ROLE
              value: "master"
            - name: MR_REDIS_HOST
              value: "redis"
            - name: INPUT_DIR
              value: "/data/input"
            - name: INTERMEDIATE_DIR
              value: "/data/intermediate"
            - name: OUTPUT_DIR
              value: "/data/output"
            - name: CHUNK_SIZE_BYTES
              value: "67108864"  # 64MB
            - name: NUM_REDUCERS
              value: "32"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mapreduce-data
