# Shared storage for input data, intermediate files, and output index.
# In production, use NFS or a cloud storage CSI driver.
# For local testing, use hostPath or a local-path provisioner.

# PersistentVolumeClaim for shared data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mapreduce-data
  namespace: mapreduce
spec:
  accessModes:
    - ReadWriteMany  # Required: multiple pods read/write simultaneously
  resources:
    requests:
      storage: 200Gi  # 80GB input + intermediate + output
  # storageClassName: nfs  # Uncomment for NFS provisioner
  # storageClassName: standard  # GKE
  # storageClassName: gp2  # EKS with EFS
