# Reducer workers — each processes one partition of the inverted index
apiVersion: batch/v1
kind: Job
metadata:
  name: mapreduce-reducers
  namespace: mapreduce
spec:
  parallelism: 3  # fits in 12GB minikube
  backoffLimit: 6
  template:
    metadata:
      labels:
        role: reducer
    spec:
      restartPolicy: OnFailure
      containers:
        - name: reducer
          image: litvinchukroman/mapreduce-index:latest
          env:
            - name: ROLE
              value: "reducer"
            - name: MR_REDIS_HOST
              value: "redis"
            - name: INTERMEDIATE_DIR
              value: "/data/intermediate"
            - name: OUTPUT_DIR
              value: "/data/output"
            - name: NUM_REDUCERS
              value: "32"
            - name: MERGE_BUFFER_SIZE
              value: "8388608"  # 8MB read buffer
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1536Mi"
              cpu: "1"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mapreduce-data
